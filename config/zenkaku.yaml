# Zen Kaku Gothic New + RobotoMono の RobotoMonoZenKaku を生成するconfig.
# docker 内から見えるpath (作業ディレクトリ /app) 前提で書いている.

jp_identifier: ZenKaku

metadata:
  vendor: mjun

fonts:
  en:
    regular: fonts/RobotoMono/RobotoMono-Regular.ttf
    bold: fonts/RobotoMono/RobotoMono-Bold.ttf
  jp:
    regular: fonts/ZenKakuGothicNew/ZenKakuGothicNew-Regular.ttf
    bold: fonts/ZenKakuGothicNew/ZenKakuGothicNew-Bold.ttf

italic_angle: -11
ascent: 1638
descent: 410
em: 2048
en_width: 1299
jp_width: 1849
jp_scale_offset: 0.10
underline_pos: -200
underline_height: 100
os2_ascent: 2146
os2_descent: 555
