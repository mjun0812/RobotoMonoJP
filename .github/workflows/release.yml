name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      configs: ${{ steps.configs.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Verify pyproject.toml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJ_VERSION="$(grep -E '^version *= *"' pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')"
          echo "tag=$TAG_VERSION project=$PROJ_VERSION"
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::pyproject.toml version ($PROJ_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Compute GHCR image tag
        id: image
        run: |
          repo_lower="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo_lower}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: List font configs
        id: configs
        run: |
          configs="$(printf '%s\n' config/*.yaml | xargs -n1 basename -s .yaml | jq -R . | jq -sc .)"
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  build-image:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Docker build
        run: docker build -t "${{ needs.prepare.outputs.image }}" .

      - name: Push image to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${{ needs.prepare.outputs.image }}"

  generate:
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.configs) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      # 準備stepは互いに独立 (system dir削除 / workspace内のgit操作 / docker daemon操作) なので
      # `parallel:` (2026-06 GA) で同時実行して wall-clock を短縮する.
      # docker image prune -af は同時実行中の docker pull と race する (pull 直後の image が
      # 未参照とみなされ削除される) ため, ここでは行わず残す rm -rf のみで容量を確保する.
      # GitHub-hosted runner の / は 14GB 程度しか空きがなく, Docker image + Nerd Fonts
      # submodule + 生成物 で "No space left on device" になるための対策.
      - parallel:
          - name: Free disk space
            run: |
              df -h /
              sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                /usr/local/share/boost /opt/hostedtoolcache/CodeQL
              df -h /

          - name: Init nerd-fonts submodule (sparse)
            # --depth=1 で shallow fetch. nerd-fonts は blob 込みで数GB あるため full clone だと
            # submodule step が数分〜10分規模で遅く, 並列化しても実質のクリティカルパスになる.
            # GitHub は uploadpack.allowReachableSHA1InWant=true なので pin sha が branch HEAD に
            # なくても fetch できる. CI では pin された1 commit を read-only に使うだけで history
            # や blame は不要なので shallow で十分.
            run: |
              git submodule init vendor/nerd-fonts
              git -c protocol.file.allow=always submodule update --depth=1 --checkout vendor/nerd-fonts
              git -C vendor/nerd-fonts sparse-checkout set --skip-checks \
                font-patcher src/glyphs bin/scripts/name_parser bin/scripts/braille

          - name: Pull generator image
            run: |
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
              docker pull "${{ needs.prepare.outputs.image }}"

      - name: Generate fonts
        run: |
          docker run --rm -v "$PWD:/app" -w /app "${{ needs.prepare.outputs.image }}" \
            python3 -m robotomonojp generate -c "config/${{ matrix.config }}.yaml" -o dist

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.config }}
          path: dist

  release:
    needs: generate
    runs-on: ubuntu-latest
    # HOMEBREW_TAP_TOKEN は environment secret として homebrew-tap に登録する.
    # environment を通じて解決されるため、他 workflow から誤って参照されない。
    # 未設定の場合は Bump Homebrew tap step が skip されるだけで release 自体は成功する。
    environment: homebrew-tap
    permissions:
      contents: write
    steps:
      # gh release create が repo owner/name の解決に .git を参照するため、
      # release assetのuploadだけでもcheckoutが必要.
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download generated fonts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Bundle TTFs for Homebrew cask
        id: bundle
        run: |
          shopt -s globstar nullglob
          mkdir -p bundle
          cp dist/**/*.ttf bundle/
          bundle_name="RobotoMonoJP-Fonts-${GITHUB_REF_NAME}.zip"
          (cd bundle && zip -q "../$bundle_name" *.ttf)
          bundle_sha=$(sha256sum "$bundle_name" | awk '{print $1}')
          echo "name=$bundle_name" >> "$GITHUB_OUTPUT"
          echo "sha256=$bundle_sha" >> "$GITHUB_OUTPUT"
          echo "bundle=$bundle_name sha256=$bundle_sha"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/**/*.ttf dist/**/*.otf "${{ steps.bundle.outputs.name }}"

      - name: Bump Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          BUNDLE_SHA256: ${{ steps.bundle.outputs.sha256 }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mjun0812/homebrew-roboto-mono-jp.git" "$tap_dir"
          cask="$tap_dir/Casks/font-roboto-mono-jp.rb"
          python3 - "$cask" "$version" "$BUNDLE_SHA256" bundle <<'PY'
          import re
          import sys
          from pathlib import Path

          path, version, sha, bundle_dir = sys.argv[1:5]

          # bundle 内の TTF 一覧から font "..." 行を動的に生成する.
          # 家系名 → variant (Default → Mono) → style (Regular → Bold → Italic → BoldItalic) の順に並べる.
          name_re = re.compile(
              r"^RobotoMono(?P<family>[A-Za-z]+?)(?P<mono>-Mono)?"
              r"-(?P<style>Regular|Bold|Italic|BoldItalic)\.ttf$"
          )
          style_order = {"Regular": 0, "Bold": 1, "Italic": 2, "BoldItalic": 3}

          def sort_key(name):
              m = name_re.match(name)
              if not m:
                  raise ValueError(f"unexpected font filename: {name!r}")
              return (m["family"], 0 if not m["mono"] else 1, style_order[m["style"]])

          font_names = sorted(
              (p.name for p in Path(bundle_dir).glob("*.ttf")),
              key=sort_key,
          )
          if not font_names:
              raise SystemExit(f"no ttf files found in {bundle_dir}")

          text = Path(path).read_text(encoding="utf-8")
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', text, count=1)

          # 既存の "font \"...\"" 行をブロック単位で新しい一覧に置き換える.
          lines = text.splitlines(keepends=True)
          font_line_indices = [i for i, ln in enumerate(lines) if ln.lstrip().startswith('font "')]
          if not font_line_indices:
              raise SystemExit("no existing font lines to replace in cask")
          first, last = font_line_indices[0], font_line_indices[-1]
          new_font_lines = [f'  font "{name}"\n' for name in font_names]
          lines[first : last + 1] = new_font_lines
          Path(path).write_text("".join(lines), encoding="utf-8")
          PY
          cd "$tap_dir"

          # mise の bootstrap.packages で tapped cask を解決するために,
          # tap の HEAD/api/cask/<token>.json に Homebrew API v2 形式の metadata を配信する.
          # 更新済みの Casks/*.rb を brew に読ませて自動生成する.
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          brew_taps_root="$(brew --repository)/Library/Taps/mjun0812"
          mkdir -p "$brew_taps_root"
          ln -sfn "$tap_dir" "$brew_taps_root/homebrew-roboto-mono-jp"
          mkdir -p "$tap_dir/api/cask"
          brew info --cask --json=v2 mjun0812/roboto-mono-jp/font-roboto-mono-jp \
            | jq '.casks[0] | .installed = null | .installed_time = null | .outdated = false' \
            > "$tap_dir/api/cask/font-roboto-mono-jp.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "cask already at $version, skip"
            exit 0
          fi
          git add Casks/font-roboto-mono-jp.rb api/cask/font-roboto-mono-jp.json
          git commit -m "chore: bump font-roboto-mono-jp to $version"
          git push origin HEAD:main
