name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      configs: ${{ steps.configs.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Verify pyproject.toml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJ_VERSION="$(grep -E '^version *= *"' pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')"
          echo "tag=$TAG_VERSION project=$PROJ_VERSION"
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::pyproject.toml version ($PROJ_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Compute GHCR image tag
        id: image
        run: |
          repo_lower="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo_lower}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: List font configs
        id: configs
        run: |
          configs="$(printf '%s\n' config/*.yaml | xargs -n1 basename -s .yaml | jq -R . | jq -sc .)"
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  build-image:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Docker build
        run: docker build -t "${{ needs.prepare.outputs.image }}" .

      - name: Push image to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${{ needs.prepare.outputs.image }}"

  generate:
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.configs) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init nerd-fonts submodule (sparse)
        run: |
          git submodule init vendor/nerd-fonts
          git -c protocol.file.allow=always submodule update --checkout vendor/nerd-fonts
          git -C vendor/nerd-fonts sparse-checkout set --skip-checks \
            font-patcher src/glyphs bin/scripts/name_parser bin/scripts/braille

      - name: Pull generator image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "${{ needs.prepare.outputs.image }}"

      - name: Generate fonts
        run: |
          docker run --rm -v "$PWD:/app" -w /app "${{ needs.prepare.outputs.image }}" \
            python3 -m robotomonojp generate -c "config/${{ matrix.config }}.yaml" -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.config }}
          path: dist

  release:
    needs: generate
    runs-on: ubuntu-latest
    # HOMEBREW_TAP_TOKEN は environment secret として homebrew-tap に登録する.
    # environment を通じて解決されるため、他 workflow から誤って参照されない。
    # 未設定の場合は Bump Homebrew tap step が skip されるだけで release 自体は成功する。
    environment: homebrew-tap
    permissions:
      contents: write
    steps:
      # gh release create が repo owner/name の解決に .git を参照するため、
      # release assetのuploadだけでもcheckoutが必要.
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download generated fonts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Bundle TTFs for Homebrew cask
        id: bundle
        run: |
          shopt -s globstar nullglob
          mkdir -p bundle
          cp dist/**/*.ttf bundle/
          bundle_name="RobotoMonoJP-Fonts-${GITHUB_REF_NAME}.zip"
          (cd bundle && zip -q "../$bundle_name" *.ttf)
          bundle_sha=$(sha256sum "$bundle_name" | awk '{print $1}')
          echo "name=$bundle_name" >> "$GITHUB_OUTPUT"
          echo "sha256=$bundle_sha" >> "$GITHUB_OUTPUT"
          echo "bundle=$bundle_name sha256=$bundle_sha"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/**/*.ttf dist/**/*.otf "${{ steps.bundle.outputs.name }}"

      - name: Bump Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          BUNDLE_SHA256: ${{ steps.bundle.outputs.sha256 }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mjun0812/homebrew-roboto-mono-jp.git" "$tap_dir"
          cask="$tap_dir/Casks/font-roboto-mono-jp.rb"
          python3 - "$cask" "$version" "$BUNDLE_SHA256" <<'PY'
          import re
          import sys
          from pathlib import Path

          path, version, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          text = Path(path).read_text(encoding="utf-8")
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', text, count=1)
          Path(path).write_text(text, encoding="utf-8")
          PY
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "cask already at $version, skip"
            exit 0
          fi
          git add Casks/font-roboto-mono-jp.rb
          git commit -m "chore: bump font-roboto-mono-jp to $version"
          git push origin HEAD:main
